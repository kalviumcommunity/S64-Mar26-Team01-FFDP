name: nanhenest
description: A cross-platform social and community mobile application built with Flutter and Firebase.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # UI & Navigation
  go_router: ^12.0.0
  google_maps_flutter: ^2.5.0

  # Utilities
  image_picker: ^1.0.0
  flutter_image_compress: ^2.0.0
  cached_network_image: ^3.3.0
  geolocator: ^10.0.0
  intl: ^0.18.0
  flutter_local_notifications: ^16.1.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - public/logo.png
    - public/logo_white.png
